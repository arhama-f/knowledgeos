# Local development stack. Bind-mounts + --reload/dev servers are intentional here;
# a production deploy should build immutable images without these.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: knowledgeos
      POSTGRES_PASSWORD: knowledgeos
      POSTGRES_DB: knowledgeos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledgeos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: knowledgeos
      MINIO_ROOT_PASSWORD: knowledgeos-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://knowledgeos:knowledgeos@postgres:5432/knowledgeos
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  celery-worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://knowledgeos:knowledgeos@postgres:5432/knowledgeos
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
    # CPU-bound: OCR, cleaning, chunking. Tune concurrency separately from embedding below.
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-Q", "ingestion", "--loglevel=info"]

  celery-worker-embedding:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://knowledgeos:knowledgeos@postgres:5432/knowledgeos
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
    # API-bound: embedding provider calls. Higher concurrency is safe here since
    # workers spend most of their time waiting on the network, not the CPU.
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-Q", "embedding", "--concurrency=8", "--loglevel=info"]

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3015:3015"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev"]

volumes:
  postgres_data:
  minio_data:
